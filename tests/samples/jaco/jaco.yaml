deployment: bench
services:
  - name: redis-primary
    replicas: 1
    networks: [stack]
  - name: redis-replica
    replicas: 2
    networks: [stack]
  # Postgres streaming-replication pair, pinned to DIFFERENT nodes so the WAL
  # stream crosses the WireGuard mesh — that's the cross-node replication the
  # api measures (bench_pg_replica_lag_seconds). Adjust host names per cluster.
  - name: pg-primary
    replicas: 1
    placement: hosts
    hosts: [jaco-2]
    networks: [stack]
  - name: pg-replica
    replicas: 1
    placement: hosts
    hosts: [jaco-3]
    networks: [stack]
  - name: api
    replicas: 2
    networks: [stack]
  - name: web
    replicas: 2
    networks: [stack]
  # node-agent — placement: global (issue #95): exactly one replica on every
  # ready node, tracking node churn. The per-node agent bind-mounts the host
  # docker log dir. `replicas` is intentionally omitted; global ignores it.
  - name: node-agent
    placement: global
    networks: [stack]
# Ingress routes:
#  - jaco.sh/        → web:80 (catch-all; the nginx UI, which also proxies /api/*
#    internally for the cross-orchestrator bench)
#  - jaco.sh/api     → api:8080 with strip_path (issue #96): the /api prefix is
#    stripped before proxying, so GET /api/notes reaches the api as /notes —
#    demonstrating ingress-level path stripping. Longest-prefix wins, so direct
#    /api hits route here rather than to the web catch-all.
routes:
  - domain: jaco.sh
    service: web
    port: 80
    tls: auto
  - domain: jaco.sh
    service: api
    port: 8080
    path: /api
    strip_path: true
    tls: auto
