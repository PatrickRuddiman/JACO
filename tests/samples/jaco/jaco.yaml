deployment: bench
services:
  - name: redis-primary
    replicas: 1
    networks: [stack]
  - name: redis-replica
    replicas: 2
    networks: [stack]
  # Postgres streaming-replication pair, pinned to DIFFERENT nodes so the WAL
  # stream crosses the WireGuard mesh — that's the cross-node replication the
  # api measures (bench_pg_replica_lag_seconds). Adjust host names per cluster.
  - name: pg-primary
    replicas: 1
    placement: hosts
    hosts: [jaco-2]
    networks: [stack]
  - name: pg-replica
    replicas: 1
    placement: hosts
    hosts: [jaco-3]
    networks: [stack]
  - name: api
    replicas: 2
    networks: [stack]
  - name: web
    replicas: 2
    networks: [stack]
# Single ingress route: jaco.sh → web:80. The web tier (nginx) reverse-proxies
# /api/* to the api service itself, so no path-based route is needed here — the
# same single-route shape ports cleanly to k8s/k3s/swarm ingress.
routes:
  - domain: jaco.sh
    service: web
    port: 80
    tls: auto
