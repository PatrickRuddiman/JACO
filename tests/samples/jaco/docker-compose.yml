# Shared workload, expressed for JACO (and a single-host `docker compose`
# dry-run). JACO pulls every image from a registry and never builds; the
# build: stanzas are accepted-and-ignored by JACO and used only by the local
# dry-run.
#
# ${VAR} references resolve from the .env file declared on jaco.yaml's
# top-level `environment:` field. The CLI loads .env, interpolates these
# scalars, and ships fully-resolved compose bytes to the daemon — secrets
# (PG creds) never live in this committed YAML, the daemon never reads the
# operator's .env, and tweaking creds is one-line in .env, no re-edit here.
#
# Local `docker compose up` for a dry-run: copy tests/samples/jaco/.env
# next to this file (or `set -a; source ../.env; set +a`) — compose will
# resolve the same ${VAR}s against the process env.
#
# deploy.resources.limits give every service an identical CPU/memory budget so
# the cross-stack comparison is fair — the same caps are applied on k8s, k3s,
# and swarm. JACO honors these per-replica (issue #49).
services:
  redis-primary:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no", "--protected-mode", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    networks: [stack]

  redis-replica:
    image: redis:7-alpine
    command: ["redis-server", "--replicaof", "redis-primary", "6379", "--replica-read-only", "yes", "--save", "", "--appendonly", "no", "--protected-mode", "no"]
    depends_on: [redis-primary]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    networks: [stack]

  # Postgres streaming-replication pair (jaco.yaml pins them to different nodes).
  # The api measures cross-node replay lag between these two.
  pg-primary:
    image: ${REGISTRY}/bench-postgres:latest
    build: ../workload/postgres
    environment:
      PG_ROLE: primary
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DB}
      POSTGRES_HOST_AUTH_METHOD: trust
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    networks: [stack]

  pg-replica:
    image: ${REGISTRY}/bench-postgres:latest
    build: ../workload/postgres
    environment:
      PG_ROLE: replica
      PG_PRIMARY_HOST: pg-primary
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    depends_on: [pg-primary]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER}"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    networks: [stack]

  api:
    image: ${REGISTRY}/bench-api:latest
    build: ../workload/api
    environment:
      REDIS_PRIMARY: redis-primary:6379
      REDIS_REPLICA: redis-replica:6379
      PG_PRIMARY: pg-primary:5432
      PG_REPLICA: pg-replica:5432
      PG_DB: ${PG_DB}
      PG_USER: ${PG_USER}
      PG_PASSWORD: ${PG_PASSWORD}
      LISTEN_PORT: "8080"
      NODE_ENV: production
    depends_on: [redis-primary, redis-replica, pg-primary, pg-replica]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    networks: [stack]

  web:
    image: ${REGISTRY}/bench-web:latest
    build: ../workload/web
    depends_on: [api]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    networks: [stack]

networks:
  stack: {}
