# redis-replica — read-only replicas of redis-primary. Scaled to N instances;
# the api's read path (REDIS_REPLICA) load-balances across them via the
# orchestrator's service DNS/VIP. `replicaof` resolves the primary by service
# name and keeps retrying until it is reachable, so boot order doesn't matter.
replicaof redis-primary 6379
replica-read-only yes
save ""
appendonly no
protected-mode no
