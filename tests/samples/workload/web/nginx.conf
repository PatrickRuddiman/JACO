worker_processes auto;
events { worker_connections 1024; }

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 80 default_server;
        server_name _;

        # Liveness probe target for the orchestrator healthcheck.
        location = /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Reverse-proxy /api/* to the api service, stripping the /api prefix.
        # Doing the path split HERE (not in the orchestrator's ingress) keeps
        # the workload identical across JACO / k8s / k3s / swarm: every stack
        # only needs a single ingress route to web:80. The `api` name resolves
        # via the embedded service DNS (127.0.0.11 for docker/swarm/JACO); the
        # variable upstream forces per-request re-resolution so traffic
        # round-robins across all api replicas instead of pinning one.
        resolver 127.0.0.11 valid=10s ipv6=off;
        location /api/ {
            rewrite ^/api/(.*)$ /$1 break;
            set $api_upstream api:8080;
            proxy_pass http://$api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 3s;
            proxy_read_timeout 30s;
        }

        # Static UX bundle.
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
