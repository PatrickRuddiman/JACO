worker_processes auto;
events { worker_connections 1024; }

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 80 default_server;
        server_name _;

        # Liveness probe target for the orchestrator healthcheck.
        location = /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Reverse-proxy /api/* to the api service, stripping the /api prefix via
        # the trailing slash on proxy_pass (/api/notes -> api:8080/notes). Doing
        # the path split HERE (not in the orchestrator's ingress) keeps the
        # workload identical across JACO / k8s / k3s / swarm: every stack needs
        # only a single ingress route to web:80. `api` resolves via the embedded
        # service DNS when nginx starts (127.0.0.11 on docker/swarm/JACO). Static
        # proxy_pass is used deliberately — the variable+resolver form trips
        # nginx's "invalid URL prefix" parsing here, and per-request re-resolution
        # isn't needed for the bench.
        location /api/ {
            proxy_pass http://api:8080/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 3s;
            proxy_read_timeout 30s;
        }

        # Static UX bundle.
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
