# /etc/jaco/jacod.yaml — JACO daemon configuration.
#
# Closed schema; unknown keys reject. See internal/daemon/config for the
# typed view + validation. After editing, `systemctl restart jacod` to
# apply (the daemon does not hot-reload).

# Filesystem root for raft store, node certs, wg keys, ACME blobs.
data_dir: /var/lib/jaco

# Cross-host gRPC endpoint — peers + remote CLI dial here. v0 ships
# plaintext TCP (Tailscale / WireGuard wraps the wire); TLS-with-
# cluster-CA lands in a follow-up.
#
# Leave the host as 0.0.0.0 to bind on every interface AND have jacod
# auto-detect a single advertise IP at startup (priority: Tailscale →
# tun/wg/jaco → RFC1918 → public). Set to a specific host:port to pin
# the advertise face (required on multi-NIC hosts with no obvious
# primary; jacod refuses to start if auto-detect finds nothing).
listen_addr: 0.0.0.0:7000

# Raft TCP transport — peer-to-peer log replication. Must differ from
# listen_addr. Same auto-detect rules as listen_addr.
cluster_addr: 0.0.0.0:7001

# Local-control socket — the `jaco` CLI dials this for cluster init/join,
# status, apply, logs, etc. Mode 0660 owned by the jaco group.
unix_socket: /var/run/jaco/jaco.sock

# WireGuard UDP listen port. 51820 is the conventional Tailscale/WG port;
# pick anything 1024-65535.
wg_port: 51820

# ACME contact address; empty disables registration contact. ACME issuance
# still works without it but Let's Encrypt may refuse.
acme_email: ""

# Log level — one of debug | info | warn | error.
log_level: info

# IPAM pool. Must be a /16 — supplies up to 256 /24 subnets, one per
# (deployment, network) pair.
ipam_pool: 10.244.0.0/16

# Runtime-layer feature flags.
#
# managed_volumes.enabled (issue #91): when true, named volumes declared
# in a deployment's top-level `volumes:` block bind-mount onto JACO's
# managed on-host tree under <data_dir>/volumes/<deployment>/<service>/
# <volume>/ instead of using docker named volumes. Required for the
# planned-move / ship-volume primitive landing in #91 PR2/PR3. Default
# false preserves existing docker-named-volume behaviour byte-for-byte.
#runtime:
#  managed_volumes:
#    enabled: false
