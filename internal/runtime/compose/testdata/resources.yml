services:
  # Modern deploy.resources block: limits + reservations. Non-resource deploy
  # subkeys (replicas, placement, restart_policy) must be accepted-and-ignored.
  modern:
    image: nginx:1.27
    deploy:
      replicas: 3
      placement:
        constraints:
          - node.role==worker
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "1.5"
          memory: 256M
          pids: 100
        reservations:
          cpus: "0.5"
          memory: 128M
  # Legacy top-level resource keys (predate deploy.resources).
  legacy:
    image: redis:7
    cpus: 0.5
    mem_limit: 128M
    mem_reservation: 64M
    pids_limit: 50
    cpu_shares: 512
    cpuset: "0,1"
  # Both modern and legacy declared: modern must win for cpus/memory/pids.
  # cpu_shares/cpuset have no modern equivalent, so they carry through.
  both:
    image: busybox
    cpus: 9.0
    mem_limit: 999M
    pids_limit: 999
    cpu_shares: 256
    cpuset: "2,3"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
          pids: 200
networks:
  default: {}
