services:
  web:
    image: nginx:1.27
    command: ["nginx", "-g", "daemon off;"]
    entrypoint: ["/docker-entrypoint.sh"]
    environment:
      NGINX_PORT: "8080"
      DEBUG: "true"
    env_file:
      - .env.web
    volumes:
      - logs:/var/log/nginx
      - /etc/nginx/conf.d:/etc/nginx/conf.d:ro
    ports:
      - "8080:80"
      - "443"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s
    labels:
      app: web
      tier: edge
    user: "1000:1000"
    working_dir: /usr/share/nginx/html
    tmpfs:
      - /run
      - /tmp
    cap_add:
      - NET_BIND_SERVICE
    cap_drop:
      - ALL
    sysctls:
      net.core.somaxconn: "1024"
    ulimits:
      nofile:
        soft: 1024
        hard: 2048
    read_only: true
    networks:
      - frontend
    restart: unless-stopped
  api:
    image: api:1.0
    networks:
      - frontend
      - backend
volumes:
  logs: {}
networks:
  frontend: {}
  backend: {}
